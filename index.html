<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e88e5">
    <title>L'Ap'Plage - Groix</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Ap'Plage">
    <link rel="apple-touch-icon" href="images/bar.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Boutons toggle -->
    <button id="btn-bars" class="map-toggle-btn"><img src="images/bar.png" style="width:20px;height:20px;"> Où boire</button>
    <button id="btn-restos" class="map-toggle-btn"><img src="images/resto.png?v=2" style="width:20px;height:20px;"> Où manger</button>

    <!-- Géolocalisation -->
    <button id="btn-geolocate" title="Ma position">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="10" r="3"/>
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
        </svg>
    </button>

    <!-- Header date/heure cliquable -->
    <button id="header" title="Choisir une date">
        <div id="header-text">
            <span id="current-date">Chargement...</span>
            <span id="current-time"></span>
        </div>
        <span id="calendar-icon" style="font-size:20px;">📅</span>
    </button>

    <!-- Panneau calendrier -->
    <div id="calendar-panel" class="hidden">
        <div id="calendar-header">
            <button id="btn-now">🔄 Maintenant</button>
            <button id="btn-cancel-cal">✕</button>
        </div>
        <div id="calendar-body">
            <p class="cal-label">📅 Choisir une date</p>
            <div id="date-selector"></div>
            <p class="cal-label">🕐 Choisir une heure</p>
            <select id="hour-selector"></select>
        </div>
        <div id="calendar-footer">
            <button id="btn-validate">✓ Valider</button>
        </div>
    </div>


    <!-- Carte -->
    <div id="map"></div>

    <!-- Légende -->
    <div id="legend">
        <div class="legend-item"><span class="dot green"></span><span>Au Top!</span></div>
        <div class="legend-item"><span class="dot blue"></span><span>Pas mal</span></div>
        <div class="legend-item"><span class="dot orange"></span><span>Bof...</span></div>
        <div class="legend-item"><span class="dot red"></span><span>A éviter</span></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="https://unpkg.com/mapbox-gl-leaflet/leaflet-mapbox-gl.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
        }
    </script>
</body>
</html>
